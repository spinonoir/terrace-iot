# Flash this first to find your sensors' raw ADC voltages.
# Open the web UI at http://breadboard-calibrate.local (or its IP address).
#
# Calibration steps:
#   1. Hold both sensors in open air for 60 seconds → note the voltages (DRY)
#   2. Submerge both sensors up to the white line in water → note the voltages (WET)
#   3. Plug those four values into breadboard-poc.yaml and flash that next.

substitutions:
  device_name: breadboard-calibrate

esphome:
  name: ${device_name}

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Calibrate Fallback"
    password: "calibrate123"

captive_portal:
logger:

ota:
  - platform: esphome
    password: !secret ota_password

# Web UI — no MQTT or Home Assistant needed for calibration
web_server:
  port: 80

sensor:
  - platform: adc
    pin: GPIO3   # D1 on XIAO ESP32C3
    name: "Sensor A Raw Voltage"
    attenuation: 12db
    update_interval: 2s
    unit_of_measurement: "V"
    accuracy_decimals: 3
    # No calibrate_linear filter here — we want the raw voltage

  - platform: adc
    pin: GPIO4   # D2 on XIAO ESP32C3
    name: "Sensor B Raw Voltage"
    attenuation: 12db
    update_interval: 2s
    unit_of_measurement: "V"
    accuracy_decimals: 3
