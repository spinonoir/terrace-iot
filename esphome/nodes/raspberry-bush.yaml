substitutions:
  device_name: raspberry-bush
  friendly_name: Raspberry Bush

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

<<: !include ../common/base.yaml

deep_sleep:
  id: deep_sleep_ctrl
  run_duration: 30s
  sleep_duration: 15min

sensor:
  - platform: adc
    pin: GPIO3   # D1 on XIAO ESP32C3
    name: "${friendly_name} Moisture"
    attenuation: 12db
    update_interval: 10s
    filters:
      - median:
          window_size: 5
          send_every: 5
      - calibrate_linear:
          - 2.80 -> 0.0
          - 1.50 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: moisture
    state_class: measurement

  - platform: adc
    pin: GPIO2   # D0 on XIAO ESP32C3
    name: "${friendly_name} Battery Voltage"
    attenuation: 12db
    update_interval: 10s
    filters:
      - multiply: 2.0
      - median:
          window_size: 3
          send_every: 3
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
