# Proof-of-concept node — two named capacitive sensors on a breadboard.
# Fill in your calibration voltages below before flashing.
# Web UI at http://breadboard-poc.local — no Home Assistant required.

substitutions:
  device_name: breadboard-poc

esphome:
  name: ${device_name}
  friendly_name: Breadboard PoC

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "PoC Fallback"
    password: "terrace123"

captive_portal:
logger:

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

sensor:
  # ── Sensor A ────────────────────────────────────────────────────────────────
  - platform: adc
    pin: GPIO3   # D1 on XIAO ESP32C3
    name: "Sensor A Moisture"
    attenuation: 12db
    update_interval: 5s
    filters:
      - median:
          window_size: 5
          send_every: 5
      - calibrate_linear:
          - 2.848 -> 0.0
          - 1.305 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: moisture
    state_class: measurement

  # ── Sensor B ────────────────────────────────────────────────────────────────
  - platform: adc
    pin: GPIO4   # D2 on XIAO ESP32C3
    name: "Sensor B Moisture"
    attenuation: 12db
    update_interval: 5s
    filters:
      - median:
          window_size: 5
          send_every: 5
      - calibrate_linear:
          - 2.848 -> 0.0
          - 1.297 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: moisture
    state_class: measurement

  # ── Wi-Fi signal strength (useful sanity-check metric) ─────────────────────
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
